<svg width="820" height="1288.0" viewBox="0 0 820 1288.0" xmlns="http://www.w3.org/2000/svg"><rect x="0.0" y="0.0" width="820.0" height="1288.0" rx="0" fill="#fdfaf3"/><rect x="0.0" y="0.0" width="820.0" height="108.0" rx="0" fill="#1e3a8a"/><text x="410.0" y="54.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle">Bài 1: Lịch sử là gì? &amp; &quot;khoa học&quot; &lt;thử ký tự lạ&gt;</text><rect x="300.0" y="82.0" width="220.0" height="22.0" rx="11" fill="#fbbf24"/><text x="410.0" y="97.5" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" font-style="normal" fill="#78350f" text-anchor="middle">TỔNG HỢP KIẾN THỨC</text><text x="40.0" y="122.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" font-style="normal" fill="#92400e" text-anchor="start">🤔  Câu hỏi khởi động</text><text x="40.0" y="142.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="normal" font-style="italic" fill="#78350f" text-anchor="start">Chiếc điện thoại em đang cầm, 50 năm trước to bằng cả căn phòng. Vì sao?</text><circle cx="57.0" cy="197.0" r="17" fill="#2563eb"/><text x="57.0" y="203.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text><text x="86.0" y="203.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="19" font-weight="bold" font-style="normal" fill="#2563eb" text-anchor="start">🧠  Khái niệm trọng tâm</text><rect x="40.0" y="224.0" width="740.0" height="134.0" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,5"/><text x="60.0" y="260.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15.5" font-weight="normal" font-style="italic" fill="#1f2937" text-anchor="start">Lịch sử là tất cả những gì đã xảy ra trong quá khứ, và môn Lịch sử là khoa học tìm</text><text x="60.0" y="283.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15.5" font-weight="normal" font-style="italic" fill="#1f2937" text-anchor="start">hiểu lại điều đó.</text><text x="60.0" y="330.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#4b5563" text-anchor="start">🎯 Nêu được khái niệm lịch sử và môn Lịch sử.</text><text x="60.0" y="350.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#4b5563" text-anchor="start">🎯 Giải thích được vì sao cần học lịch sử.</text><circle cx="57.0" cy="397.0" r="17" fill="#059669"/><text x="57.0" y="403.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text><text x="86.0" y="403.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="19" font-weight="bold" font-style="normal" fill="#059669" text-anchor="start">Mọi thứ đều thay đổi theo thời gian</text><rect x="40.0" y="424.0" width="740.0" height="82.0" rx="12" fill="#ffffff" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,5"/><text x="60.0" y="460.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" font-weight="normal" font-style="normal" fill="#4b5563" text-anchor="start">• Con người, đồ vật và xã hội đều không ngừng biến đổi.</text><text x="60.0" y="481.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" font-weight="normal" font-style="normal" fill="#4b5563" text-anchor="start">• Sự thay đổi đó được gọi là lịch sử.</text><circle cx="57.0" cy="545.0" r="17" fill="#7c3aed"/><text x="57.0" y="551.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text><text x="86.0" y="551.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="19" font-weight="bold" font-style="normal" fill="#7c3aed" text-anchor="start">🌍  Vì sao cần học lịch sử?</text><rect x="40.0" y="572.0" width="740.0" height="162.0" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,5"/><rect x="60.0" y="592.0" width="700.0" height="68.0" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/><text x="76.0" y="618.0" font-family="'Consolas', 'SF Mono', Menlo, monospace" font-size="16" font-weight="bold" font-style="normal" fill="#3730a3" text-anchor="start">Không có công thức, dùng thử render</text><text x="76.0" y="642.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13.5" font-weight="normal" font-style="normal" fill="#4338ca" text-anchor="start">t — mốc thời gian (năm)</text><text x="60.0" y="688.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" font-weight="normal" font-style="normal" fill="#4b5563" text-anchor="start">• Hiểu nguồn gốc của mọi sự vật.</text><text x="60.0" y="709.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" font-weight="normal" font-style="normal" fill="#4b5563" text-anchor="start">• Rút kinh nghiệm để định hướng tương lai.</text><circle cx="57.0" cy="773.0" r="17" fill="#db2777"/><text x="57.0" y="779.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text><text x="86.0" y="779.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="19" font-weight="bold" font-style="normal" fill="#db2777" text-anchor="start">🔑  Từ khoá cần nhớ</text><rect x="40.0" y="800.0" width="740.0" height="124.0" rx="12" fill="#ffffff" stroke="#db2777" stroke-width="1.5" stroke-dasharray="6,5"/><text x="60.0" y="836.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold" font-style="normal" fill="#1f2937" text-anchor="start">Lịch sử: Tất cả những gì đã xảy ra trong quá khứ.</text><text x="76.0" y="854.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="normal" font-style="italic" fill="#6b7280" text-anchor="start">Ví dụ: Bức ảnh em chụp hồi lớp 1 đã là lịch sử của chính em.</text><text x="60.0" y="878.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold" font-style="normal" fill="#1f2937" text-anchor="start">Quá khứ | Hiện tại: Mốc chia theo thời gian</text><text x="76.0" y="896.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="normal" font-style="italic" fill="#6b7280" text-anchor="start">Ví dụ: Hôm qua | hôm nay</text><circle cx="57.0" cy="963.0" r="17" fill="#0891b2"/><text x="57.0" y="969.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text><text x="86.0" y="969.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="19" font-weight="bold" font-style="normal" fill="#0891b2" text-anchor="start">💡  Lưu ý &amp; mẹo nhớ</text><rect x="40.0" y="990.0" width="740.0" height="120.0" rx="12" fill="#ffffff" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="6,5"/><text x="60.0" y="1026.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#4b5563" text-anchor="start">• Album ảnh cũ của ông bà ghi lại lịch sử của gia đình em.</text><text x="60.0" y="1046.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#4b5563" text-anchor="start">• Lịch sử chỉ là chuyện vua chúa, chiến tranh. → thực ra: Lịch sử là mọi thứ đã xảy ra, kể cả</text><text x="78.0" y="1066.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#4b5563" text-anchor="start">việc em học lớp 5 năm ngoái.</text><text x="60.0" y="1086.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="normal" font-style="normal" fill="#4b5563" text-anchor="start">• Lịch sử = ĐÃ + XẢY RA. Đã xảy ra rồi thì là lịch sử, dù mới hôm qua.</text><circle cx="57.0" cy="1149.0" r="17" fill="#d97706"/><text x="57.0" y="1155.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">6</text><text x="86.0" y="1155.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="19" font-weight="bold" font-style="normal" fill="#d97706" text-anchor="start">⭐  Ghi nhớ nhanh</text><rect x="40.0" y="1176.0" width="740.0" height="86.0" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="60.0" y="1212.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="normal" font-style="normal" fill="#78350f" text-anchor="start">⭐ Lịch sử = mọi thứ đã xảy ra, kể cả chuyện hôm qua.</text><text x="60.0" y="1235.0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="normal" font-style="normal" fill="#78350f" text-anchor="start">⭐ Học lịch sử để hiểu hiện tại, định hướng tương lai.</text></svg>